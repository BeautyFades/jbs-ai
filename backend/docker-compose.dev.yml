# Dev overlay: hot-reload via uvicorn --reload + bind-mounted source.
# Usage (from backend/): docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "app",
        "--reload-dir",
        "mocks",
      ]
    volumes:
      # Mount only source trees so the image's .venv stays intact.
      - ./app:/app/app
      - ./mocks:/app/mocks
    environment:
      MCP_MODE: mock
    restart: "no"
