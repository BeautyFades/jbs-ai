services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MCP_MODE: mock
      # Use the bundled Postgres by default; override via .env for real envs.
      DATABASE_URL: postgresql+asyncpg://jbs:jbs@db:5432/jbs_ai
      DB_CREATE_ALL: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jbs
      POSTGRES_PASSWORD: jbs
      POSTGRES_DB: jbs_ai
    ports:
      - "5432:5432"
    volumes:
      - jbs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jbs -d jbs_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  jbs_pgdata:
